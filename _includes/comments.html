{% if page.comments != false %}
<section class="article-comments">
  <!--
    Giscus setup:
    1. Enable GitHub Discussions on the freshwater-gazette.github.io repo
    2. Visit https://giscus.app, enter your repo, and copy the generated values
    3. Replace the placeholder attributes below
  -->
  <script src="https://giscus.app/client.js"
    data-repo="YOUR_GITHUB_USERNAME/freshwater-gazette.github.io"
    data-repo-id="YOUR_REPO_ID"
    data-category="General"
    data-category-id="YOUR_CATEGORY_ID"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="light"
    data-lang="en"
    crossorigin="anonymous"
    async>
  </script>
</section>
{% endif %}
