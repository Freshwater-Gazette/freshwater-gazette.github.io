---
layout: default
title: "All Articles"
description: "All articles from The Freshwater Gazette."
permalink: /blog/
---

<div class="static-page">
  <h1>All Articles</h1>
  <nav class="archive-list" aria-label="All articles">
    {% for post in site.posts %}
    <a href="{{ post.url | relative_url }}" class="archive-item">
      <span class="archive-item__title">{{ post.title }}</span>
      <span class="archive-item__date">{{ post.date | date: "%b %-d, %Y" }}</span>
    </a>
    {% endfor %}
  </nav>
</div>
